name: Release Gate

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Project OS
        run: npm run validate:ops

      - name: Check release blockers
        run: npm run release:gate
