<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0f1a"/>
  
  <!-- Outer ring gradient -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#grad1)" stroke-width="8" opacity="0.8"/>
  
  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#grad2)" stroke-width="4" opacity="0.4"/>
  
  <!-- Center hub -->
  <circle cx="256" cy="256" r="80" fill="url(#grad1)" filter="url(#glow)"/>
  
  <!-- Connection lines (hub spokes) -->
  <g stroke="url(#grad2)" stroke-width="6" opacity="0.7" stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="80"/>
    <line x1="256" y1="256" x2="400" y2="130"/>
    <line x1="256" y1="256" x2="400" y2="382"/>
    <line x1="256" y1="256" x2="256" y2="432"/>
    <line x1="256" y1="256" x2="112" y2="382"/>
    <line x1="256" y1="256" x2="112" y2="130"/>
  </g>
  
  <!-- Orbit dots -->
  <g filter="url(#glow)">
    <circle cx="256" cy="70" r="24" fill="url(#grad1)"/>
    <circle cx="410" cy="120" r="20" fill="#06b6d4"/>
    <circle cx="410" cy="392" r="20" fill="#8b5cf6"/>
    <circle cx="256" cy="442" r="24" fill="url(#grad1)"/>
    <circle cx="102" cy="392" r="20" fill="#ec4899"/>
    <circle cx="102" cy="120" r="20" fill="#06b6d4"/>
  </g>
  
  <!-- Lightning bolt in center -->
  <path d="M270 200 L220 256 L255 256 L240 312 L290 248 L255 248 L270 200 Z" 
        fill="white" filter="url(#glow)"/>
</svg>