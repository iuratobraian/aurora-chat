<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0f1a"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#grad1)" stroke-width="8" opacity="0.8"/>
  
  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#grad2)" stroke-width="4" opacity="0.4"/>
  
  <!-- Hub center dot -->
  <circle cx="256" cy="256" r="40" fill="url(#grad1)"/>
  
  <!-- Connection lines (hub spokes) -->
  <g stroke="url(#grad2)" stroke-width="6" opacity="0.6">
    <line x1="256" y1="256" x2="256" y2="90"/>
    <line x1="256" y1="256" x2="420" y2="176"/>
    <line x1="256" y1="256" x2="420" y2="336"/>
    <line x1="256" y1="256" x2="256" y2="422"/>
    <line x1="256" y1="256" x2="92" y2="336"/>
    <line x1="256" y1="256" x2="92" y2="176"/>
  </g>
  
  <!-- Orbit dots -->
  <circle cx="256" cy="90" r="18" fill="url(#grad1)" filter="url(#glow)"/>
  <circle cx="420" cy="176" r="14" fill="#06b6d4"/>
  <circle cx="420" cy="336" r="14" fill="#8b5cf6"/>
  <circle cx="256" cy="422" r="18" fill="url(#grad1)" filter="url(#glow)"/>
  <circle cx="92" cy="336" r="14" fill="#ec4899"/>
  <circle cx="92" cy="176" r="14" fill="#06b6d4"/>
  
  <!-- Center lightning bolt -->
  <path d="M270 220 L240 270 L265 270 L245 320 L285 260 L260 260 L280 220 Z" 
        fill="white" 
        stroke="url(#grad1)" 
        stroke-width="3"
        filter="url(#glow)"/>
  
  <!-- "TH" letters behind -->
  <text x="256" y="270" 
        font-family="Arial Black, sans-serif" 
        font-size="80" 
        font-weight="900"
        fill="url(#grad1)" 
        fill-opacity="0.15"
        text-anchor="middle">TH</text>
</svg>
